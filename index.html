<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>短網址產生器</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        input { width: 300px; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #2ea44f; color: white; border: none; border-radius: 6px; }
        button:hover { background-color: #2c974b; }
    </style>
</head>
<body>
    <h2>建立新的短網址</h2>

    <div class="input-group">
        <input type="text" id="urlTitle" placeholder="輸入備註 (例如: 我的臉書粉專)">
    </div>
    <div class="input-group">
        <input type="url" id="longUrl" placeholder="輸入長網址 (例如: https://...)">
    </div>
    
    <button onclick="generateIssue()">產生 GitHub 連結</button>

    <div id="result" style="margin-top: 30px;"></div>

    <script>
        function generateIssue() {
            var urlTitle = document.getElementById('urlTitle').value || "未命名網址";
            var longUrl = document.getElementById('longUrl').value;
            
            if(!longUrl.startsWith('http')) {
                alert('請輸入正確的長網址！');
                return;
            }
            
            // 倉庫地址
            var githubRepo = "https://github.com/joy40217/url-shortener/issues/new";
            
            // 進行 URL 編碼
            var encodedTitle = encodeURIComponent(urlTitle);
            var encodedBody = encodeURIComponent(longUrl);
            
            // 產生網址
            var finalLink = `${githubRepo}?template=short-url.md&title=${encodedTitle}&body=${encodedBody}`;
            
            document.getElementById('result').innerHTML = `
                <p>請點擊下方按鈕前往 GitHub 送出：</p>
                <a href="${finalLink}" target="_blank" style="display:inline-block; padding:10px 20px; background:#2ea44f; color:white; text-decoration:none; border-radius:6px; font-weight:bold;">
                   👉 前往 GitHub 建立 
                </a>
            `;
        }
    </script>
</body>
</html>
