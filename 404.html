<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      /**
       * Configuration goes here
       */
      // Format: https://api.github.com/repos/{owner}/{repo}/issues/
      var GITHUB_ISSUES_LINK =
        "https://api.github.com/repos/joy40217/url-shortener/issues/";
      var PATH_SEGMENTS_TO_SKIP = 1;

      /**
       * DO NOT TOUCH ANYTHING BELOW THIS COMMENT UNLESS YOU KNOW WHAT YOU ARE DOING
       */
      function isUrl(url) {
        // Regex from https://stackoverflow.com/a/3809435, with a modification to allow for TLDs of up to 24 characters
        return /^https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{2,256}\.[a-z]{2,24}\b([-a-zA-Z0-9@:%_\+.~#?&//=]*)+$/.test(
          url
        );
      }

      function redirect() {
        var location = window.location;
        var issueNumber = location.pathname.split("/")[
          PATH_SEGMENTS_TO_SKIP + 1
        ];
        var homepage =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          "/" +
          location.pathname.split("/")[PATH_SEGMENTS_TO_SKIP];

        // 如果網址沒有帶 Issue 編號，直接跳回首頁
        if (!issueNumber) {
           location.replace(homepage);
           return;
        }

        var xhr = new XMLHttpRequest();

        xhr.onload = function () {
          try {
            var payload = JSON.parse(xhr.response);

            // 檢查 Issue 是否被關閉 (Closed)
            if (payload.state === "closed") {
              document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px; font-family:sans-serif; color:#333;'>這個短網址已經失效囉！</h1>";
              return; // 停止執行後續轉址
            }

            // 從 Issue 內文 (Body) 中撈出真正的長網址
            if (payload.body) {
              var urlRegex = /(https?:\/\/[^\s]+)/g;
              var matches = payload.body.match(urlRegex);
              
              if (matches && matches.length > 0) {
                var targetBodyUrl = matches[0];
                
                // 驗證內文抓到的網址格式，並避免遞迴跳轉自己
                var bodyUrlObj = document.createElement("a");
                bodyUrlObj.setAttribute("href", targetBodyUrl);
                
                if (isUrl(targetBodyUrl) && bodyUrlObj.hostname !== location.hostname) {
                  location.replace(targetBodyUrl);
                  return; // 成功從內文轉址，結束函式
                }
              }
            }

            // 向下相容防呆 (如果內文沒有網址，改讀取標題 title)
            var message = payload.message;
            var title = payload.title;

            // Workaround IE 11 lack of support for new URL()
            var url = document.createElement("a");
            url.setAttribute("href", title);

            // Invalid URLs includes invalid issue numbers, issue titles that are not URLs, and recursive destination URLs
            var isInvalidUrl =
              message === "Not Found" ||
              !title ||
              !isUrl(title) ||
              url.hostname === location.hostname;

            if (isInvalidUrl) {
              location.replace(homepage);
            } else {
              location.replace(title);
            }
          } catch (e) {
            location.replace(homepage);
          }
        };

        xhr.onerror = function () {
          location.replace(homepage);
        };
        
        xhr.open("GET", GITHUB_ISSUES_LINK + issueNumber);
        xhr.send();
      }

      redirect();
    </script>
  </head>
  <body></body>
</html>
